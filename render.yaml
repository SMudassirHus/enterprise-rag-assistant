services:
  - type: web
    name: atlas-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: API_PREFIX
        value: /api
      - key: OPENAI_API_KEY
        sync: false
      - key: EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: CHAT_MODEL
        value: gpt-4o-mini
      - key: CHROMA_DB_DIR
        value: /var/data/chroma
      - key: CHROMA_COLLECTION_NAME
        value: enterprise_documents
      - key: RETRIEVAL_TOP_K
        value: 3
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: DOCUMENT_METADATA_FILE
        value: /var/data/uploads/documents.json
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: BACKEND_CORS_ORIGINS
        sync: false
